<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PARCS Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>
</head>
<body>

<nav>
  <span class="lab-name" onclick="showHome()">
    PARCS Lab
    <small>People and Robot Collaborative Systems Lab</small>
  </span>
  <div class="tab-links">
    <button onclick="show('about', this)">About</button>
    <button onclick="show('news', this)">News</button>
    <button onclick="show('team', this)">Team</button>
    <button onclick="show('publications', this)">Publications</button>
  </div>
</nav>

<main id="content"></main>

<footer>© 2026 PARCS Lab · Northeastern University</footer>

<script>
  const pages = {
    about: 'about.html',
    team: 'team.html',
    publications: 'publications.html',
    news: 'news.html'
  };

  async function show(tab, btn) {
    document.querySelectorAll('.tab-links button').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    const res = await fetch(pages[tab]);
    document.getElementById('content').innerHTML = await res.text();
  }

  async function showHome() {
    document.querySelectorAll('.tab-links button').forEach(b => b.classList.remove('active'));
    const res = await fetch('home.html');
    document.getElementById('content').innerHTML = await res.text();
  }

  showHome();
</script>

</body>
</html>
